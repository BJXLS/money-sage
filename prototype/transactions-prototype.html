<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneySage — 收支记录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="shared.css">
</head>
<body class="h-screen overflow-hidden">
  <div class="flex h-full">
    <!-- Sidebar -->
    <aside class="w-[200px] flex-shrink-0 flex flex-col" style="background-color: var(--bg-secondary); border-right: 1px solid var(--border-subtle);">
      <div class="h-16 flex items-center px-5 gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white" style="background: var(--gradient-primary);">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <span class="text-lg font-bold" style="background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">MoneySage</span>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
        <a href="dashboard-prototype.html" class="nav-item">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          <span class="text-sm font-medium">仪表盘</span>
        </a>
        <a href="transactions-prototype.html" class="nav-item active">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
          <span class="text-sm font-medium">收支记录</span>
        </a>
        <a href="categories-budget-prototype.html" class="nav-item">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
          <span class="text-sm font-medium">分类与预算</span>
        </a>
        <a href="analysis-prototype.html" class="nav-item">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          <span class="text-sm font-medium">智能分析</span>
        </a>
      </nav>
      <div class="p-4 border-t" style="border-color: var(--border-subtle);">
        <div class="flex items-center gap-3 px-2 py-2 rounded-xl surface">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: var(--gradient-primary);">
            <span class="text-white text-sm font-bold">G</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate text-primary">GeHao</div>
            <div class="text-xs text-tertiary">Pro 用户</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0" style="background-color: var(--bg-primary);">
      <!-- Header -->
      <header class="h-16 flex items-center justify-between px-8 border-b" style="border-color: var(--border-subtle); background-color: var(--bg-primary);">
        <div>
          <h1 class="text-xl font-bold text-primary">收支记录</h1>
          <p class="text-xs text-tertiary mt-0.5">日历视图 · 点击日期查看详情</p>
        </div>
        <div class="flex items-center gap-3">
          <button class="theme-toggle" id="themeToggle" title="切换主题">
            <svg id="sunIcon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <svg id="moonIcon" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          </button>
          <button class="btn-ghost">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            <span class="text-sm">导出</span>
          </button>
          <button class="btn-primary">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span class="text-sm">记一笔</span>
          </button>
        </div>
      </header>

      <!-- Content -->
      <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-[1440px] mx-auto">
          <!-- Month Navigation -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-4">
              <button class="theme-toggle w-9 h-9">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
              </button>
              <h2 class="text-2xl font-bold text-primary stat-value">2026 年 6 月</h2>
              <button class="theme-toggle w-9 h-9">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>
            <div class="flex items-center gap-6 text-sm">
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full" style="background-color: var(--income);"></span>
                <span class="text-secondary">收入</span>
                <span class="font-semibold text-primary stat-value">¥ 18,500.00</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full" style="background-color: var(--expense);"></span>
                <span class="text-secondary">支出</span>
                <span class="font-semibold text-primary stat-value">¥ 12,340.00</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full" style="background-color: #6366f1;"></span>
                <span class="text-secondary">结余</span>
                <span class="font-semibold text-primary stat-value">¥ 6,160.00</span>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Calendar -->
            <div class="lg:col-span-2 card p-6">
              <div class="grid grid-cols-7 gap-2 mb-3">
                <div class="text-center text-xs font-medium text-tertiary py-2">日</div>
                <div class="text-center text-xs font-medium text-tertiary py-2">一</div>
                <div class="text-center text-xs font-medium text-tertiary py-2">二</div>
                <div class="text-center text-xs font-medium text-tertiary py-2">三</div>
                <div class="text-center text-xs font-medium text-tertiary py-2">四</div>
                <div class="text-center text-xs font-medium text-tertiary py-2">五</div>
                <div class="text-center text-xs font-medium text-tertiary py-2">六</div>
              </div>
              <div class="grid grid-cols-7 gap-2" id="calendarGrid">
                <!-- Calendar days generated by JS -->
              </div>
            </div>

            <!-- Day Detail Panel -->
            <div class="space-y-6">
              <!-- Summary Card -->
              <div class="card p-5">
                <div class="flex items-center justify-between mb-4">
                  <h3 class="font-semibold text-primary">6月25日 周三</h3>
                  <span class="badge" style="background-color: rgba(99, 102, 241, 0.1); color: #6366f1;">今天</span>
                </div>
                <div class="grid grid-cols-3 gap-4 text-center">
                  <div>
                    <div class="text-xs text-tertiary mb-1">收入</div>
                    <div class="text-sm font-semibold stat-value" style="color: var(--income);">¥ 0.00</div>
                  </div>
                  <div>
                    <div class="text-xs text-tertiary mb-1">支出</div>
                    <div class="text-sm font-semibold stat-value" style="color: var(--expense);">¥ 136.00</div>
                  </div>
                  <div>
                    <div class="text-xs text-tertiary mb-1">结余</div>
                    <div class="text-sm font-semibold stat-value text-primary">-¥ 136.00</div>
                  </div>
                </div>
              </div>

              <!-- Quick Add Form -->
              <div class="card p-5">
                <h3 class="font-semibold text-primary mb-4">快速记账</h3>
                <div class="space-y-4">
                  <div class="segment-control w-full">
                    <button class="segment-btn active flex-1">支出</button>
                    <button class="segment-btn flex-1">收入</button>
                  </div>
                  <div>
                    <label class="block text-xs text-tertiary mb-1.5">金额</label>
                    <input type="number" class="input-field" placeholder="0.00" step="0.01">
                  </div>
                  <div>
                    <label class="block text-xs text-tertiary mb-1.5">分类</label>
                    <select class="select-field">
                      <option>餐饮 - 午餐</option>
                      <option>餐饮 - 晚餐</option>
                      <option>交通 - 地铁</option>
                      <option>购物 - 日用品</option>
                      <option>娱乐 - 电影</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-xs text-tertiary mb-1.5">描述</label>
                    <input type="text" class="input-field" placeholder="例如：午餐">
                  </div>
                  <button class="btn-primary w-full justify-center">保存</button>
                </div>
              </div>

              <!-- Day Transactions -->
              <div class="card p-5">
                <h3 class="font-semibold text-primary mb-4">当日交易</h3>
                <div class="space-y-3">
                  <div class="flex items-center justify-between p-3 rounded-xl" style="background-color: var(--bg-secondary);">
                    <div class="flex items-center gap-3">
                      <div class="category-icon" style="background-color: rgba(245, 158, 11, 0.12);">🍜</div>
                      <div>
                        <div class="text-sm font-medium text-primary">午餐 - 川菜馆</div>
                        <div class="text-xs text-tertiary">餐饮</div>
                      </div>
                    </div>
                    <div class="text-sm font-semibold stat-value" style="color: var(--expense);">-¥ 86.00</div>
                  </div>
                  <div class="flex items-center justify-between p-3 rounded-xl" style="background-color: var(--bg-secondary);">
                    <div class="flex items-center gap-3">
                      <div class="category-icon" style="background-color: rgba(59, 130, 246, 0.12);">🚇</div>
                      <div>
                        <div class="text-sm font-medium text-primary">地铁充值</div>
                        <div class="text-xs text-tertiary">交通</div>
                      </div>
                    </div>
                    <div class="text-sm font-semibold stat-value" style="color: var(--expense);">-¥ 50.00</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const html = document.documentElement;

    function updateThemeIcon(theme) {
      if (theme === 'dark') { sunIcon.classList.add('hidden'); moonIcon.classList.remove('hidden'); }
      else { sunIcon.classList.remove('hidden'); moonIcon.classList.add('hidden'); }
    }

    function getInitialTheme() {
      const saved = localStorage.getItem('money-sage-theme');
      if (saved === 'light' || saved === 'dark') return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    let currentTheme = getInitialTheme();
    html.setAttribute('data-theme', currentTheme);
    updateThemeIcon(currentTheme);

    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', currentTheme);
      localStorage.setItem('money-sage-theme', currentTheme);
      updateThemeIcon(currentTheme);
    });

    // Generate calendar
    const calendarGrid = document.getElementById('calendarGrid');
    const startOffset = 1; // June 2026 starts on Monday (offset 1 for Sunday start)
    const daysInMonth = 30;
    const today = 25;

    const sampleData = {
      3: { expense: 120 },
      5: { expense: 456 },
      8: { expense: 89 },
      12: { expense: 230 },
      15: { income: 18500 },
      18: { expense: 567 },
      20: { expense: 324 },
      23: { expense: 78 },
      24: { expense: 324 },
      25: { expense: 136 },
    };

    for (let i = 0; i < startOffset; i++) {
      const empty = document.createElement('div');
      empty.className = 'h-24 rounded-xl';
      calendarGrid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const cell = document.createElement('div');
      const isToday = day === today;
      const data = sampleData[day] || {};
      const hasExpense = data.expense > 0;
      const hasIncome = data.income > 0;

      cell.className = `h-24 rounded-xl p-2 cursor-pointer border transition-all hover:shadow-md flex flex-col justify-between ${
        isToday 
          ? 'border-primary-500 ring-1 ring-primary-500/30' 
          : 'border-transparent hover:border-[var(--border-default)]'
      }`;
      cell.style.backgroundColor = isToday ? 'var(--surface-secondary)' : 'var(--surface-primary)';
      cell.style.borderColor = isToday ? '#6366f1' : 'var(--border-subtle)';

      let bottomHtml = '';
      if (hasIncome) {
        bottomHtml += `<div class="text-xs font-medium stat-value" style="color: var(--income);">+¥${data.income.toLocaleString()}</div>`;
      }
      if (hasExpense) {
        bottomHtml += `<div class="text-xs font-medium stat-value" style="color: var(--expense);">-¥${data.expense}</div>`;
      }

      cell.innerHTML = `
        <div class="flex items-center justify-between">
          <span class="text-sm font-medium ${isToday ? 'text-primary-600' : 'text-primary'}">${day}</span>
          ${isToday ? '<span class="w-1.5 h-1.5 rounded-full" style="background: var(--gradient-primary);"></span>' : ''}
        </div>
        <div class="space-y-0.5">${bottomHtml}</div>
      `;
      calendarGrid.appendChild(cell);
    }
  </script>
</body>
</html>
